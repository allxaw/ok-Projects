<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz.css">
   
</head>

<body>
    <div class="container">
    
        <header class="header">
        <p style="font-size: 40px;">Quiz</p>
        <p class="status-time">Time:<span class="time">20</span></p>
        </header>
        
        <main class="main-question">
            <div class="question"></div>
            <div class="answer-container"></div>
        </main>

        <footer class="footer">
            <p><span class="first"></span> of <span class="last"></span>Question</p>
            <a class="next-Question" href="#">next</a>
            <a class="end-Quiz" href="#">End Quiz</a>
        </footer>
    </div>

    <div class="result-box">
        <div class="cup">
            <img class="cupimage" style="width: 85px;">
        </div>

        <div class="message">
            <p class="message-text"></p>
         <p> You got
            <span class="result-right"></span>
            out of
            <span class="of-question"></span>
         </p>
        </div>

    <a href="#" class="restart-quiz">Restart Quiz</a>

    </div>

<script src="questionseu.js"></script>
<script src="quiz.js"></script>

</body>
</html>
